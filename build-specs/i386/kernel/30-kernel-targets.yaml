# Shared compile-step body for the per-subsystem kernel object builds. Each subsystem
# target merges this with `<<:` and overrides only `use`, `cwd`, `output_dir`, and
# (where needed) `discover`. Defined here as a top-level key the build loader ignores;
# the anchor is file-local, so it must stay in this file with its consumers.
_compile_subsystem: &compile_subsystem
  kind: compile
  source_view: uts-at386
  continue_on_error: false
  parallel: true
  discover:
    extensions:
      - .c

targets:
  os-at386:
    description: Compile the core operating-system sources under uts/i386/os.
    depends_on:
      - prepare-layout
    steps:
      - <<: *compile_subsystem
        use: [os-at386]
        cwd: os
        output_dir: "{obj_root}/os"

  vm-at386:
    description: Compile the virtual-memory subsystem sources under uts/i386/vm.
    depends_on:
      - prepare-layout
    steps:
      - <<: *compile_subsystem
        use: [vm-at386]
        cwd: vm
        output_dir: "{obj_root}/vm"

  disp-at386:
    description: Compile the scheduling and dispatcher classes under uts/i386/disp.
    depends_on:
      - prepare-layout
    steps:
      - <<: *compile_subsystem
        use: [disp-at386]
        cwd: disp
        output_dir: "{obj_root}/disp"

  vx-at386:
    description: Compile the VP/ix support driver sources under uts/i386/vx.
    depends_on:
      - prepare-layout
    steps:
      - <<: *compile_subsystem
        use: [vx-at386]
        cwd: vx
        output_dir: "{obj_root}/vx"

  exec-at386:
    description: Compile all executable-loader families under uts/i386/exec.
    depends_on:
      - prepare-layout
    steps:
      - <<: *compile_subsystem
        use: [exec-at386]
        cwd: exec
        output_dir: "{obj_root}/exec"
        discover:
          recursive: true
          extensions:
            - .c

  io-core-at386:
    description: Compile the generic and flat AT386 overlay driver sources under uts/i386/io, excluding ws, kd, and kdvm subtrees.
    depends_on:
      - prepare-layout
    steps:
      - <<: *compile_subsystem
        use: [io-at386]
        cwd: io
        output_dir: "{obj_root}/io/core"
        discover:
          recursive: true
          extensions:
            - .c
            - .s
          exclude_dirs:
            - ws
            - kd
            - kdvm
            - mouse

  io-ws-at386:
    description: Compile the workstation stream driver subtree under uts/i386/io/ws.
    depends_on:
      - prepare-layout
    steps:
      - <<: *compile_subsystem
        use: [io-at386]
        cwd: io/ws
        output_dir: "{obj_root}/io/ws"

  io-kd-at386:
    description: Compile the AT386 keyboard and display driver subtree under uts/arch/at/i386/io/kd.
    depends_on:
      - prepare-layout
    steps:
      - <<: *compile_subsystem
        use: [io-at386]
        cwd: io/kd
        output_dir: "{obj_root}/io/kd"

  io-kdvm-at386:
    description: Compile the AT386 KD virtual-memory companion driver under uts/arch/at/i386/io/kdvm.
    depends_on:
      - prepare-layout
    steps:
      - <<: *compile_subsystem
        use: [io-at386]
        cwd: io/kdvm
        output_dir: "{obj_root}/io/kdvm"
        parallel: false

  io-mouse-at386:
    description: Compile the AT386 PS/2 (AT&T 320) mouse driver subtree under uts/arch/at/i386/io/mouse.
    depends_on:
      - prepare-layout
    steps:
      - <<: *compile_subsystem
        use: [io-at386]
        cwd: io/mouse
        output_dir: "{obj_root}/io/mouse"

  io-at386:
    description: Aggregate the generic, workstation, and AT386-specific driver subtrees.
    depends_on:
      - io-core-at386
      - io-ws-at386
      - io-kd-at386
      - io-kdvm-at386
      - io-mouse-at386

  ml-at386:
    description: Build the low-level machine-layer objects, including the generated locore/start/syms kernel inputs.
    depends_on:
      - prepare-layout
    steps:
      - kind: command
        argv:
          - python3
          - "{kernel_root}/tools/uts_ml_build.py"
          - --workspace-root
          - "{workspace_root}"
          - --obj-root
          - "{obj_root}/ml"
          - --pack-root
          - "{pack_root}/kernel"
          - --cc
          - "{cc}"
          - --cpp
          - "{cpp}"
          - --ld
          - "{ld}"
          - --cflags
          - "{kernel_recompile_cflags}"
          - --cflag=-I..
          - --cpp-flag=-P
          - --cpp-flag=-I..
          - --cpp-flag=-D_KERNEL
          - --cpp-flag=-DLOCORE
          - --cpp-flag=-DAT386
          - --cpp-flag=-DVPIX
          - --cpp-flag=-DWEITEK
          - --cpp-flag=-DWEITEK_EMULATOR

  fs-at386:
    description: Compile the full filesystem stack, including nested filesystem types, under uts/i386/fs.
    depends_on:
      - prepare-layout
    steps:
      - <<: *compile_subsystem
        use: [fs-at386]
        cwd: fs
        output_dir: "{obj_root}/fs"
        discover:
          recursive: true
          extensions:
            - .c

  des-at386:
    description: Compile the kernel DES sources under uts/i386/des.
    depends_on:
      - prepare-layout
    steps:
      - <<: *compile_subsystem
        use: [netmod-at386]
        cwd: des
        output_dir: "{obj_root}/des"

  rpc-at386:
    description: Compile the kernel RPC sources under uts/i386/rpc.
    depends_on:
      - prepare-layout
    steps:
      - <<: *compile_subsystem
        use: [netmod-at386]
        cwd: rpc
        output_dir: "{obj_root}/rpc"

  ktli-at386:
    description: Compile the kernel TLI sources under uts/i386/ktli.
    depends_on:
      - prepare-layout
    steps:
      - <<: *compile_subsystem
        use: [netmod-at386]
        cwd: ktli
        output_dir: "{obj_root}/ktli"

  klm-at386:
    description: Compile the kernel lock-manager sources under uts/i386/klm.
    depends_on:
      - prepare-layout
    steps:
      - <<: *compile_subsystem
        use: [netmod-at386]
        cwd: klm
        output_dir: "{obj_root}/klm"

  netinet-at386:
    description: Compile the TCP/IP stack sources under uts/i386/netinet.
    depends_on:
      - prepare-layout
    steps:
      - <<: *compile_subsystem
        use: [netinet-at386]
        cwd: netinet
        output_dir: "{obj_root}/netinet"

  network-at386:
    description: Aggregate the network-facing kernel modules that historical nonet builds excluded.
    depends_on:
      - des-at386
      - rpc-at386
      - ktli-at386
      - klm-at386
      - netinet-at386

  kdb-core-at386:
    description: Compile the in-kernel debugger core under uts/i386/kdb/kdb.
    depends_on:
      - prepare-layout
    steps:
      - <<: *compile_subsystem
        use: [kdb-at386]
        cwd: kdb/kdb
        output_dir: "{obj_root}/kdb/core"

  kdb-gdebugger-at386:
    description: Compile the graphical debugger companion sources under uts/i386/kdb/gdebugger.
    depends_on:
      - prepare-layout
    steps:
      - <<: *compile_subsystem
        use: [kdb-at386]
        cwd: kdb/gdebugger
        output_dir: "{obj_root}/kdb/gdebugger"
        parallel: false

  kdb-util-at386:
    description: Compile the in-kernel debugger support sources under uts/i386/kdb/kdb-util.
    depends_on:
      - prepare-layout
    steps:
      - <<: *compile_subsystem
        use: [kdb-at386]
        cwd: kdb/kdb-util
        output_dir: "{obj_root}/kdb/kdb-util"

  kdb-at386:
    description: Aggregate the kernel debugger families that participate in the AT386 kernel build tree.
    depends_on:
      - kdb-core-at386
      - kdb-gdebugger-at386
      - kdb-util-at386

  kernel-core-at386:
    description: Aggregate the non-network kernel subsystems that form the AT386 kernel proper.
    depends_on:
      - config-at386
      - os-at386
      - vm-at386
      - disp-at386
      - vx-at386
      - exec-at386
      - io-at386
      - ml-at386
      - fs-at386

  kernel-at386-nonet:
    description: Full AT386 kernel build graph without the network-facing subsystems.
    depends_on:
      - kernel-core-at386
      - kdb-at386

  kernel-at386:
    description: Full AT386 kernel build graph across the complete uts/i386 tree, including network and debugger subsystems.
    depends_on:
      - kernel-core-at386
      - network-at386
      - kdb-at386

  kernel-system-at386:
    description: Full AT386 kernel graph plus the historical platform families and manifest-driven system-build phases.
    depends_on:
      - kernel-at386
      - historical-platform-at386
      - master-tree-at386
      - idbuild-at386
