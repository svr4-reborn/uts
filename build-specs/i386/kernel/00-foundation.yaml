# Canonical kernel codegen (ABI) flags. This is the single source of truth for the
# i386 kernel object ABI: it is spliced into toolchain.cflags below (as a YAML anchor)
# and exposed to the re-compiling helper tools (driver-compose, idmkunix, ml) via the
# {kernel_codegen} variable. The two representations must stay byte-identical; they are
# kept adjacent here so any drift is visible in a single screen.
_kernel_codegen: &kernel_codegen
  - -std=gnu89
  - -fcommon
  - -fno-builtin
  - -fno-tree-vectorize
  - -O2
  - -m32
  - -mno-mmx
  - -mno-sse
  - -mno-sse2

toolchain:
  cc: i686-pc-sysv4-mlibc-gcc
  cpp: i686-pc-sysv4-mlibc-cpp
  ld: i686-pc-sysv4-mlibc-ld
  # Per-subsystem compiles: shared codegen base + toolchain-only hardening. Feature
  # defines (-D_KERNEL, -DAT386, ...) come from the per-subsystem profiles, not here.
  cflags:
    - *kernel_codegen
    - -fno-unwind-tables
    - -fno-asynchronous-unwind-tables
    - -mgeneral-regs-only
    - -nostdinc
    - -nostdlib
    - -Werror
    - -DREL="4"
    - -DVER="2.1"
    - -DSYSV
  cppflags:
    - -P
  ldflags: []

variables:
  # Mirror of &kernel_codegen above, as a shlex-splittable string for the helper tools
  # that re-compile generated glue (conf.c, Driver.o stubs, locore). Keep in sync with
  # the anchor. The helper re-compiles deliberately omit the toolchain-only hardening
  # flags (-Werror, -nostdinc, ...) because the generated sources are not warning-clean.
  kernel_codegen: "-std=gnu89 -fcommon -fno-builtin -fno-tree-vectorize -O2 -m32 -mno-mmx -mno-sse -mno-sse2"
  # Feature defines used by the helper re-compiles (NOT the per-subsystem profiles, which
  # vary these per directory). SVR40 here is intentional and specific to this stage.
  kernel_defines: "-D_KERNEL -DAT386 -DWEITEK -DWEITEK_EMULATOR -DSYSV -DSVR40"
  kernel_recompile_cflags: "{kernel_codegen} {kernel_defines}"
  system_root: "{builddir}/uts/i386/system-root"
  conf_root: "{builddir}/uts/i386/conf"
  cf_dir: "{conf_root}/cf.d"
  pack_root: "{conf_root}/pack.d"
  obj_root: "{builddir}/uts/i386/obj"
  boot_symvals_root: "{builddir}/uts/i386/boot/symvals"
  reference_boot_floppy: "{repo_root}/original_diskettes/Base 01 (2.1a).img"
  hybrid_boot_floppy: "{builddir}/boot-media/base01-hybrid.img"
  hybrid_boot_report: "{builddir}/boot-media/base01-hybrid-layout.json"
  hybrid_boot_replacement_manifest: "{kernel_root}/build-specs/i386/boot-floppy-replacements.json"
  hybrid_boot_replacement_set: "label-hybrid"
  hybrid_boot_labeled_floppy: "{builddir}/boot-media/base01-hybrid-labeled.img"
  hybrid_boot_labeled_report: "{builddir}/boot-media/base01-hybrid-labeled-layout.json"
  boot_floppy: "{builddir}/boot-media/base01-boot.img"
  boot_report: "{builddir}/boot-media/base01-boot-layout.json"
  boot_replacement_set: "kernel-at386"
  boot_labeled_floppy: "{builddir}/boot-media/base01-boot-labeled.img"
  boot_labeled_report: "{builddir}/boot-media/base01-boot-labeled-layout.json"
  boot_labeled_replacement_set: "kernel-at386-labeled"
  floppy_cf_dir: "{conf_root}/cf.d.floppy"
  floppy_driver_compose_report: "{floppy_cf_dir}/driver-compose-report.json"
  floppy_unix: "{floppy_cf_dir}/unix"
  boot_kernel_stripped: "{builddir}/boot-media/unix.at386.floppy"
  driver_compose_report: "{cf_dir}/driver-compose-report.json"
  init_root: "{conf_root}/init.d"
  mfsys_root: "{conf_root}/mfsys.d"
  node_root: "{conf_root}/node.d"
  rc_root: "{conf_root}/rc.d"
  sd_root: "{conf_root}/sd.d"
  mdevice_root: "{conf_root}/mdevice.d"
  sdevice_root: "{conf_root}/sdevice.d"
  sfsys_root: "{conf_root}/sfsys.d"

source_views:
  uts-at386:
    roots:
      - "{kernel_root}/arch/at/i386"
      - "{kernel_root}/i386"

profiles:
  kernmap-at386:
    flags:
      - -I.
      - -D_KERNEL
      - -DAT386
      - -DWEITEK
      - -DWEITEK_EMULATOR

  os-at386:
    flags:
      - -I..
      - -D_KERNEL
      - -DAT386
      - -DWEITEK

  vm-at386:
    flags:
      - -I..
      - -D_KERNEL
      - -Dnotnow
      - -DAT386

  exec-at386:
    flags:
      - -I../..
      - -D_KERNEL
      - -DAT386

  io-at386:
    include_source_view_roots: true
    flags:
      - -I..
      - -I../..
      - -D_KERNEL
      - -DSYSV
      - -DSVR40
      - -DWEITEK
      - -DAT386

  fs-at386:
    flags:
      - -I..
      - -I../..
      - -D_KERNEL
      - -DQUOTA
      - -DAT386

  disp-at386:
    flags:
      - -I..
      - -D_KERNEL
      - -DAT386

  vx-at386:
    flags:
      - -I..
      - -D_KERNEL
      - -DAT386

  netmod-at386:
    flags:
      - -I..
      - -D_KERNEL
      - -DSYSV
      - -DAT386

  netinet-at386:
    flags:
      - -I..
      - -D_KERNEL
      - -DSYSV
      - -Di386
      - -DAT386

  kdb-at386:
    flags:
      - -I../..
      - -D_KERNEL
      - -DAT386

  ml-at386:
    flags:
      - -I..
      - -D_KERNEL
      - -DAT386
      - -DWEITEK
      - -DWEITEK_EMULATOR
