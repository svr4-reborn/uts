targets:
  prepare-layout:
    description: Create the full AT386 kernel object and conf tree roots used by the YAML-driven build graph.
    steps:
      - kind: mkdirs
        paths:
          - "{conf_root}"
          - "{cf_dir}"
          - "{pack_root}"
          - "{obj_root}"
          - "{init_root}"
          - "{mfsys_root}"
          - "{node_root}"
          - "{rc_root}"
          - "{sd_root}"
          - "{mdevice_root}"
          - "{sdevice_root}"
          - "{sfsys_root}"

  config-at386:
    description: Materialize the top-level preprocessed kernel configuration inputs that feed the final system build.
    depends_on:
      - prepare-layout
    steps:
      - kind: preprocess
        source_view: uts-at386
        use:
          - kernmap-at386
        cwd: .
        source: kernmap
        output: "{cf_dir}/kernmap"

      - kind: preprocess
        source_view: uts-at386
        use:
          - kernmap-at386
        cwd: .
        source: vuifile
        output: "{cf_dir}/vuifile"

  master-tree-at386:
    description: Stage the historical uts/i386/master.d and uts/arch/at/i386/master.d metadata into the synthetic conf tree.
    depends_on:
      - config-at386
    steps:
      - kind: command
        argv:
          - python3
          - "{kernel_root}/tools/uts_stage_master_at386.py"
          - --workspace-root
          - "{workspace_root}"
          - --conf-root
          - "{conf_root}"
          - --cpp
          - "{cpp}"
          - --cpp-flag=-P
          - --cpp-flag=-DAT386
          - --cpp-flag=-DWEITEK
          - --cpp-flag=-DWEITEK_EMULATOR

  idfiles-at386:
    description: Build the aggregate cf.d input files consumed by the historical idtools from staged metadata fragments.
    depends_on:
      - master-tree-at386
    steps:
      - kind: command
        argv:
          - sh
          - -eu
          - -c
          - |
            aggregate() {{
              out="$1"
              dir="$2"
              : > "$out"
              for f in "$dir"/*; do
                [ -f "$f" ] || continue
                cat "$f" >> "$out"
                printf '\n' >> "$out"
              done
            }}

            aggregate "{cf_dir}/mfsys" "{mfsys_root}"
            aggregate "{cf_dir}/sdevice" "{sdevice_root}"
            aggregate "{cf_dir}/sfsys" "{sfsys_root}"

  idfiles-at386-floppy:
    description: Build reduced cf.d input files for the floppy-sized AT386 kernel.
    depends_on:
      - idfiles-at386
    steps:
      - kind: command
        argv:
          - sh
          - -eu
          - -c
          - |
            mkdir -p "{floppy_cf_dir}"
            cp -p "{cf_dir}/mdevice" "{cf_dir}/mfsys" "{cf_dir}/mtune" "{cf_dir}/stune" "{cf_dir}/sassign" "{cf_dir}/vuifile" "{floppy_cf_dir}/"

            awk '
              BEGIN {{
                enable["ramd"] = 1
                split("bfs fdfs hd i286x intp kdb kdb-util arp ip krpc ktli prf raio rawip RFS rt sockmod tcp ticlts ticots ptm pts sem shm ticotsor sxt timod ufs udp vx xnamfs xout xt", disabled)
                for (i in disabled) exclude[disabled[i]] = 1
              }}
              /^[*#]/ || NF == 0 {{ print; next }}
              $1 in enable {{ $2 = "Y" }}
              $1 in exclude {{ $2 = "N" }}
              {{ print }}
            ' "{cf_dir}/sdevice" > "{floppy_cf_dir}/sdevice"

            awk '
              BEGIN {{
                split("bfs fdfs RFS ufs xnamfs", disabled)
                for (i in disabled) exclude[disabled[i]] = 1
              }}
              /^[*#]/ || NF == 0 {{ print; next }}
              $1 in exclude {{ $2 = "N" }}
              {{ print }}
            ' "{cf_dir}/sfsys" > "{floppy_cf_dir}/sfsys"

  idconfig-at386:
    description: Generate config.h, conf.c, fsconf.c, vector.c, and direct with the ported idconfig.
    depends_on:
      - driver-packages-at386
    steps:
      - kind: command
        argv:
          - idconfig
          - -r
          - "{conf_root}"
          - -i
          - "{cf_dir}"
          - -o
          - "{cf_dir}"

  idconfig-at386-floppy:
    description: Generate reduced floppy config outputs with the ported idconfig.
    depends_on:
      - driver-packages-at386
      - idfiles-at386-floppy
    steps:
      - kind: command
        argv:
          - idconfig
          - -r
          - "{conf_root}"
          - -i
          - "{floppy_cf_dir}"
          - -o
          - "{floppy_cf_dir}"

  driver-packages-at386:
    description: Compose pack.d/<module>/Driver.o files from the YAML-driven object tree and staged idtools metadata.
    depends_on:
      - kernel-at386
      - idfiles-at386
    steps:
      - kind: command
        argv:
          - python3
          - "{kernel_root}/tools/uts_driver_compose.py"
          - --conf-root
          - "{conf_root}"
          - --obj-root
          - "{obj_root}"
          - --workspace-root
          - "{workspace_root}"
          - --cc
          - "{cc}"
          - --ld
          - "{ld}"
          - --cflags
          - "{kernel_recompile_cflags}"
          - --include-dir={cf_dir}
          - --include-dir={kernel_root}/arch/at/i386
          - --include-dir={kernel_root}/i386
          - --report
          - "{driver_compose_report}"

  driver-packages-at386-floppy:
    description: Compose the reduced pack.d/<module>/Driver.o set for the floppy-sized AT386 kernel.
    depends_on:
      - kernel-core-at386
      - idfiles-at386-floppy
    steps:
      - kind: command
        argv:
          - python3
          - "{kernel_root}/tools/uts_driver_compose.py"
          - --conf-root
          - "{conf_root}"
          - --obj-root
          - "{obj_root}"
          - --workspace-root
          - "{workspace_root}"
          - --cc
          - "{cc}"
          - --ld
          - "{ld}"
          - --cflags
          - "{kernel_recompile_cflags} -DRAMD_BOOT"
          - --include-dir={floppy_cf_dir}
          - --include-dir={kernel_root}/arch/at/i386
          - --include-dir={kernel_root}/i386
          - --report
          - "{floppy_driver_compose_report}"

  idbuild-at386:
    description: Build the final AT386 unix image with the ported idmkunix over the generated idconfig outputs and pack.d tree.
    depends_on:
      - idconfig-at386
    steps:
      - kind: command
        cwd: "{cf_dir}"
        argv:
          - idmkunix
          - -i
          - "{cf_dir}"
          - -o
          - "{cf_dir}"
          - -p
          - "{pack_root}"
          - -c
          - "{cc}"
          - -l
          - "{ld}"
          - -Y
          - "{kernel_codegen}"
          - -DWEITEK_EMULATOR
          - -DSVR40
          - -DRAMD_BOOT
          - -I
          - "{cf_dir}"
          - -I
          - "{kernel_root}/arch/at/i386"
          - -I
          - "{kernel_root}/i386"

  idbuild-at386-floppy:
    description: Build the reduced AT386 unix image intended to fit on the boot floppy filesystem.
    depends_on:
      - idconfig-at386-floppy
    steps:
      - kind: command
        cwd: "{floppy_cf_dir}"
        argv:
          - idmkunix
          - -i
          - "{floppy_cf_dir}"
          - -o
          - "{floppy_cf_dir}"
          - -p
          - "{pack_root}"
          - -c
          - "{cc}"
          - -l
          - "{ld}"
          - -Y
          - "{kernel_codegen}"
          - -DWEITEK_EMULATOR
          - -DSVR40
          - -DRAMD_BOOT
          - -I
          - "{floppy_cf_dir}"
          - -I
          - "{kernel_root}/arch/at/i386"
          - -I
          - "{kernel_root}/i386"
